<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Campaigns - Loan & CrowdFunding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 900: '#312e81' },
                        accent: { 500: '#f59e0b' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard-styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-50 text-slate-900 font-sans antialiased">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar Container -->
        <aside
            class="w-64 fixed inset-y-0 left-0 z-50 transition-transform duration-300 transform -translate-x-full md:translate-x-0"
            id="sidebar-container">
            <!-- Injected by layout.js -->
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-0 md:ml-64 flex flex-col h-screen overflow-y-auto relative">

            <!-- Header -->
            <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
                <div class="px-8 py-4 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <button onclick="window.history.back()"
                            class="p-2 rounded-full hover:bg-slate-100 transition-colors" title="Go Back">
                            <i data-lucide="arrow-left" class="h-6 w-6 text-slate-600"></i>
                        </button>
                        <div>
                            <h1 class="font-display text-2xl font-bold text-slate-900">My Campaigns</h1>
                            <p class="text-slate-500 text-sm mt-1">Track your crowdfunding campaigns</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <a href="create-campaign.html"
                            class="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-lg transition-colors shadow-lg shadow-brand-500/20 text-sm">
                            Create New Campaign
                        </a>
                        <div class="h-10 w-10 rounded-full bg-brand-600 text-white flex items-center justify-center font-bold shadow-lg shadow-brand-500/20"
                            id="header-user-initial">
                            U
                        </div>
                    </div>
                </div>
            </header>

            <div class="p-8 max-w-7xl mx-auto w-full">

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="campaigns-grid">
                    <!-- Campaigns will be injected here -->
                </div>

            </div>
        </main>
    </div>

    <script src="utils.js"></script>
    <script src="layout.js"></script>
    <script src="my-campaigns.js"></script>
</body>

</html>
