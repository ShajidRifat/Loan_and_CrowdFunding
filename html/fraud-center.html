<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Center - Loan & CrowdFunding</title>

    <!-- Fonts & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e' },
                        accent: { 500: '#6366f1' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard-styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-50 h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <!-- Sidebar Container -->
    <aside
        class="w-64 fixed inset-y-0 left-0 z-50 transition-transform duration-300 transform -translate-x-full md:translate-x-0"
        id="sidebar-container">
        <!-- Injected by layout.js -->
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-0 md:ml-64 flex flex-col h-full overflow-hidden relative">
        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-7xl mx-auto fade-in">
                <!-- Top Header -->
                <header class="bg-white border-b border-slate-200 sticky top-0 z-40 mb-8">
                    <div class="px-8 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="flex items-center gap-4 w-full md:w-auto">
                            <button onclick="window.history.back()"
                                class="p-2 rounded-full hover:bg-slate-100 transition-colors" title="Go Back">
                                <i data-lucide="arrow-left" class="h-6 w-6 text-slate-600"></i>
                            </button>
                            <div>
                                <h1 class="font-display text-2xl font-bold text-slate-900">Suspicious Activity Monitor
                                </h1>
                                <p class="text-slate-500 text-sm mt-1">Real-time alerts on potential fraud patterns.</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <!-- Notifications -->
                            <div class="relative">
                                <button id="btn-notifications"
                                    class="relative p-2 text-slate-400 hover:text-brand-600 transition-colors">
                                    <i data-lucide="bell" class="h-6 w-6"></i>
                                    <span
                                        class="absolute top-1.5 right-1.5 h-2.5 w-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                                </button>
                                <!-- Dropdown -->
                                <div id="dropdown-notifications"
                                    class="hidden absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-lg border border-slate-100 z-50 overflow-hidden">
                                    <div class="p-4 border-b border-slate-50 flex justify-between items-center">
                                        <h3 class="font-bold text-slate-900">Notifications</h3>
                                        <button id="btn-mark-read"
                                            class="text-xs text-brand-600 font-medium hover:underline">Mark all
                                            read</button>
                                    </div>
                                    <div class="max-h-64 overflow-y-auto">
                                        <div class="p-4 text-center text-slate-500 text-sm">No new alerts</div>
                                    </div>
                                </div>
                            </div>

                            <!-- Profile -->
                            <div class="relative">
                                <button id="btn-profile"
                                    class="h-10 w-10 rounded-full bg-slate-800 text-white flex items-center justify-center font-bold shadow-lg hover:ring-4 hover:ring-slate-100 transition-all">
                                    <span id="header-user-initial-inner">A</span>
                                </button>
                                <!-- Dropdown -->
                                <div id="dropdown-profile"
                                    class="hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg border border-slate-100 z-50 overflow-hidden">
                                    <div class="p-4 border-b border-slate-50">
                                        <p class="font-bold text-slate-900 truncate" id="dropdown-user-name">Analyst
                                            User</p>
                                        <p class="text-xs text-slate-500 truncate" id="dropdown-user-email">
                                            analyst@example.com</p>
                                    </div>
                                    <div class="py-2">
                                        <a href="profile.html"
                                            class="flex items-center gap-2 px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 hover:text-brand-600 transition-colors">
                                            <i data-lucide="user" class="h-4 w-4"></i> My Profile
                                        </a>
                                        <a href="profile.html"
                                            class="flex items-center gap-2 px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 hover:text-brand-600 transition-colors">
                                            <i data-lucide="settings" class="h-4 w-4"></i> Settings
                                        </a>
                                        <div class="h-px bg-slate-100 my-1"></div>
                                        <button onclick="auth.logout()"
                                            class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors">
                                            <i data-lucide="log-out" class="h-4 w-4"></i> Sign Out
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </header>

                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="px-6 py-4 font-semibold text-slate-900">User</th>
                                <th class="px-6 py-4 font-semibold text-slate-900">Activity</th>
                                <th class="px-6 py-4 font-semibold text-slate-900">Risk Score</th>
                                <th class="px-6 py-4 font-semibold text-slate-900">Status</th>
                                <th class="px-6 py-4 font-semibold text-slate-900 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100" id="fraud-table-body">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Investigation Modal -->
    <div id="investigation-modal"
        class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-50 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 transform scale-95 transition-transform duration-300"
            id="investigation-modal-content">
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                <h3 class="text-xl font-bold text-slate-900">Investigation Details</h3>
                <button onclick="closeInvestigation()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x" class="h-6 w-6"></i>
                </button>
            </div>

            <div id="investigation-body">
                <!-- Injected content -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="utils.js"></script>
    <script src="layout.js"></script>
    <script src="fraud-center.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = layout.init();
            if (user.role !== 'admin') window.location.href = 'dashboard.html';

            renderFraudDashboard();
        });
    </script>
</body>

</html>
