<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Marketplace - UniFund</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="utils.js"></script>
    <script src="campaign-marketplace.js"></script>
    <script src="layout.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-900 antialiased font-sans">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div id="sidebar-container" class="w-64 flex-shrink-0 hidden md:block"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <!-- Header -->
            <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 z-20" id="main-header">
                <!-- Populated by layout.js -->
                <div class="px-6 py-4 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button onclick="window.history.back()"
                            class="p-2 rounded-full hover:bg-slate-100 transition-colors" title="Go Back">
                            <i data-lucide="arrow-left" class="h-6 w-6 text-slate-600"></i>
                        </button>
                        <h1 class="text-2xl font-display font-bold text-slate-900">Campaign Marketplace</h1>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-3 pl-4 border-l border-slate-200">
                            <div class="text-right hidden sm:block">
                                <div class="text-sm font-bold text-slate-900" id="header-user-name">User</div>
                                <div class="text-xs text-slate-500" id="header-user-role">Role</div>
                            </div>
                            <div class="h-10 w-10 rounded-full bg-brand-100 flex items-center justify-center text-brand-600 font-bold border border-brand-200"
                                id="header-user-initial">
                                U
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Scrollable Content -->
            <main class="flex-1 overflow-y-auto p-6 space-y-8">

                <!-- Filters (Visual only for demo) -->
                <div class="flex flex-wrap gap-2">
                    <button
                        class="px-4 py-2 bg-brand-600 text-white rounded-full text-sm font-bold shadow-md shadow-brand-200">All
                        Campaigns</button>
                    <button
                        class="px-4 py-2 bg-white text-slate-600 hover:bg-slate-50 border border-slate-200 rounded-full text-sm font-medium transition-colors">Emergency</button>
                    <button
                        class="px-4 py-2 bg-white text-slate-600 hover:bg-slate-50 border border-slate-200 rounded-full text-sm font-medium transition-colors">Projects</button>
                    <button
                        class="px-4 py-2 bg-white text-slate-600 hover:bg-slate-50 border border-slate-200 rounded-full text-sm font-medium transition-colors">Tuition</button>
                    <button
                        class="px-4 py-2 bg-white text-slate-600 hover:bg-slate-50 border border-slate-200 rounded-full text-sm font-medium transition-colors">Medical</button>
                </div>

                <!-- Campaign Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="marketplace-grid">
                    <!-- Populated by JS -->
                    <div class="col-span-full text-center py-12 text-slate-500">Loading campaigns...</div>
                </div>

            </main>
        </div>
    </div>

    <!-- Rating Modal -->
    <div id="rating-modal"
        class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm m-4 shadow-2xl scale-95 opacity-0 transition-all duration-300"
            id="rating-modal-content">
            <h3 class="text-lg font-bold text-center mb-2">Rate this Campaign</h3>
            <p class="text-sm text-slate-500 text-center mb-6" id="rating-modal-title">How impactful was "Campaign
                Name"?</p>

            <div class="flex justify-center gap-2 mb-6" id="star-container">
                <button class="text-slate-300 hover:text-yellow-400 transition-colors" data-value="1"><i
                        data-lucide="star" class="h-8 w-8 fill-current"></i></button>
                <button class="text-slate-300 hover:text-yellow-400 transition-colors" data-value="2"><i
                        data-lucide="star" class="h-8 w-8 fill-current"></i></button>
                <button class="text-slate-300 hover:text-yellow-400 transition-colors" data-value="3"><i
                        data-lucide="star" class="h-8 w-8 fill-current"></i></button>
                <button class="text-slate-300 hover:text-yellow-400 transition-colors" data-value="4"><i
                        data-lucide="star" class="h-8 w-8 fill-current"></i></button>
                <button class="text-slate-300 hover:text-yellow-400 transition-colors" data-value="5"><i
                        data-lucide="star" class="h-8 w-8 fill-current"></i></button>
            </div>

            <textarea id="rating-comment"
                class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none mb-4"
                placeholder="Write a short review (optional)..." rows="3"></textarea>

            <div class="flex gap-3">
                <button onclick="closeRatingModal()"
                    class="flex-1 py-2 text-slate-600 font-medium hover:bg-slate-50 rounded-lg">Cancel</button>
                <button onclick="submitRating()"
                    class="flex-1 py-2 bg-brand-600 text-white font-bold rounded-lg hover:bg-brand-700 shadow-lg shadow-brand-200">Submit</button>
            </div>
        </div>
    </div>

    <!-- Script moved to campaign-marketplace.js -->
    <script>
        // Inline script removed. Logic is in campaign-marketplace.js
    </script>
</body>

</html>
