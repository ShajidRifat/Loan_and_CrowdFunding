<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Loan & CrowdFunding</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#4f46e5', 600: '#4338ca', 700: '#3730a3', 900: '#312e81' },
                        accent: { 500: '#f59e0b' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard-styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-50 h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <!-- Sidebar Container -->
    <aside
        class="w-64 fixed inset-y-0 left-0 z-50 transition-transform duration-300 transform -translate-x-full md:translate-x-0"
        id="sidebar-container">
        <!-- Injected by layout.js -->
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-0 md:ml-64 flex flex-col h-full overflow-hidden relative">
        <!-- Mobile Header -->
        <header class="md:hidden bg-white border-b border-slate-200 p-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="graduation-cap" class="text-brand-600 h-6 w-6"></i>
                <span class="font-bold text-slate-900">UniFund</span>
            </div>
            <button id="mobile-menu-btn" class="text-slate-500"><i data-lucide="menu" class="h-6 w-6"></i></button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50">
            <div class="max-w-4xl mx-auto fade-in">

                <div class="mb-8 flex items-center gap-4">
                    <button onclick="window.history.back()"
                        class="p-2 rounded-full hover:bg-slate-200 transition-colors" title="Go Back">
                        <i data-lucide="arrow-left" class="h-6 w-6 text-slate-600"></i>
                    </button>
                    <div>
                        <h1 class="text-3xl font-display font-bold text-slate-900">Profile Settings</h1>
                        <p class="text-slate-500 mt-1">Manage your account information</p>
                    </div>
                </div>

                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">

                    <!-- Personal Information -->
                    <div class="mb-10">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-1 h-6 bg-brand-600 rounded-full"></div>
                            <h2 class="text-xl font-bold text-slate-900">Personal Information</h2>
                        </div>

                        <div class="flex flex-col items-center mb-8">
                            <div class="relative">
                                <div class="h-28 w-28 rounded-full overflow-hidden border-4 border-slate-100">
                                    <img id="profile-avatar" src="" alt="Profile" class="w-full h-full object-cover">
                                </div>
                            </div>
                        </div>

                        <div class="grid md:grid-cols-2 gap-6 mb-6">
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">First Name</label>
                                <input type="text" id="input-first-name" readonly
                                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-500 font-medium outline-none"
                                    placeholder="First Name">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">Last Name</label>
                                <input type="text" id="input-last-name" readonly
                                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-500 font-medium outline-none"
                                    placeholder="Last Name">
                            </div>
                        </div>

                        <div class="space-y-2 mb-6">
                            <label class="text-sm font-bold text-slate-700">Email Address</label>
                            <input type="email" id="input-email" readonly
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-500 font-medium outline-none"
                                placeholder="Email Address">
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-700">Phone Number</label>
                            <input type="tel" id="input-phone" readonly
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-500 font-medium outline-none"
                                placeholder="Phone Number">
                        </div>
                    </div>

                    <!-- University Information -->
                    <div class="mb-10" id="section-university">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-1 h-6 bg-brand-600 rounded-full"></div>
                            <h2 class="text-xl font-bold text-slate-900">University Information</h2>
                        </div>

                        <div class="space-y-6">
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">University</label>
                                <input type="text" id="input-university" readonly
                                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-500 font-medium outline-none"
                                    placeholder="University Name">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">Student ID</label>
                                <input type="text" id="input-student-id" readonly
                                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-500 font-medium outline-none"
                                    placeholder="Student ID">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">Major</label>
                                <input type="text" id="input-major" readonly
                                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-500 font-medium outline-none"
                                    placeholder="Major">
                            </div>
                        </div>
                    </div>

                    <!-- Change Password -->
                    <div class="mb-10">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-1 h-6 bg-brand-600 rounded-full"></div>
                            <h2 class="text-xl font-bold text-slate-900">Change Password</h2>
                        </div>

                        <div class="space-y-6">
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">Current Password</label>
                                <input type="password"
                                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 outline-none transition-all font-medium text-slate-900"
                                    placeholder="Enter current password">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">New Password</label>
                                <input type="password" name="new_password"
                                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 outline-none transition-all font-medium text-slate-900"
                                    placeholder="Enter new password">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">Confirm New Password</label>
                                <input type="password" name="confirm_password"
                                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 outline-none transition-all font-medium text-slate-900"
                                    placeholder="Confirm new password">
                            </div>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="flex justify-end gap-4 pt-6 border-t border-slate-100">
                        <button onclick="window.history.back()"
                            class="px-8 py-3 rounded-xl font-bold text-brand-600 border-2 border-brand-600 hover:bg-brand-50 transition-colors">
                            Cancel
                        </button>
                        <button id="save-profile-btn"
                            class="px-8 py-3 rounded-xl font-bold bg-brand-600 text-white hover:bg-brand-700 shadow-lg shadow-brand-500/20 transition-all hover:-translate-y-1">
                            Update Password
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="utils.js?v=3"></script>
    <script src="layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const authUser = layout.init();
            if (!authUser) return;

            // Load Profile Data from API
            try {
                const data = await utils.apiCall(`api/get_profile.php?user_id=${authUser.id}`);

                if (data && data.user) {
                    const u = data.user;
                    const p = data.profile || {};

                    // Populate Basics
                    const nameParts = (u.full_name || "").split(' ');
                    document.getElementById('input-first-name').value = nameParts[0] || "";
                    document.getElementById('input-last-name').value = nameParts.slice(1).join(' ') || "";
                    document.getElementById('input-email').value = u.email || "";
                    document.getElementById('input-phone').value = u.phone_number || "";

                    if (u.avatar_url) {
                        document.getElementById('profile-avatar').src = u.avatar_url;
                    } else {
                        document.getElementById('profile-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${(u.full_name || 'User').replace(' ', '')}`;
                    }

                    // Populate Role Specifics
                    if (authUser.role === 'student') {
                        document.getElementById('input-university').value = p.university || "";
                        document.getElementById('input-student-id').value = p.student_id_number || "";
                        document.getElementById('input-major').value = p.major || "";
                    } else {
                        // Hide student section for non-students
                        const uniSection = document.getElementById('section-university');
                        if (uniSection) uniSection.style.display = 'none';
                    }
                }
            } catch (error) {
                console.error('Failed to load profile:', error);
                utils.showNotification('Failed to load profile data', 'error');
            }

            // Save Changes (Password Only)
            const saveBtn = document.getElementById('save-profile-btn');
            if (saveBtn) {
                saveBtn.addEventListener('click', async () => {
                    saveBtn.disabled = true;
                    saveBtn.textContent = 'Updating...';

                    const password = document.querySelector('input[name="new_password"]').value;
                    const confirmPassword = document.querySelector('input[name="confirm_password"]').value;

                    if (!password) {
                        utils.showNotification('Please enter a new password', 'error');
                        saveBtn.disabled = false;
                        saveBtn.textContent = 'Update Password';
                        return;
                    }

                    if (password !== confirmPassword) {
                        utils.showNotification('Passwords do not match', 'error');
                        saveBtn.disabled = false;
                        saveBtn.textContent = 'Update Password';
                        return;
                    }

                    const payload = {
                        user_id: authUser.id,
                        new_password: password
                    };

                    try {
                        await utils.apiCall('api/update_profile.php', 'POST', payload);
                        utils.showNotification('Password updated successfully!', 'success');

                        // Clear inputs
                        document.querySelector('input[name="new_password"]').value = '';
                        document.querySelector('input[name="confirm_password"]').value = '';
                        document.querySelector('input[placeholder="Enter current password"]').value = '';

                    } catch (error) {
                        console.error('Update failed:', error);
                        utils.showNotification(error.message || 'Update failed', 'error');
                    } finally {
                        saveBtn.disabled = false;
                        saveBtn.textContent = 'Update Password';
                    }
                });
            }

            // Mobile Menu Toggle
            const mobileBtn = document.getElementById('mobile-menu-btn');
            if (mobileBtn) {
                mobileBtn.addEventListener('click', () => {
                    const sidebar = document.getElementById('sidebar-container');
                    if (sidebar) sidebar.classList.toggle('-translate-x-full');
                });
            }
        });
    </script>
</body>

</html>
