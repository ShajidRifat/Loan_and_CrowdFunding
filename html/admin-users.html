<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin Console</title>

    <!-- Fonts & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e' },
                        accent: { 500: '#6366f1' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard-styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-50 h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <!-- Sidebar Container -->
    <aside
        class="w-64 fixed inset-y-0 left-0 z-50 transition-transform duration-300 transform -translate-x-full md:translate-x-0"
        id="sidebar-container">
        <!-- Injected by layout.js -->
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-0 md:ml-64 flex flex-col h-full overflow-hidden relative">
        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-7xl mx-auto fade-in">
                <div class="flex justify-between items-center mb-8">
                    <div class="flex items-center gap-4">
                        <button onclick="window.history.back()"
                            class="p-2 rounded-full hover:bg-slate-200 transition-colors" title="Go Back">
                            <i data-lucide="arrow-left" class="h-6 w-6 text-slate-600"></i>
                        </button>
                        <div>
                            <h1 class="text-2xl font-bold text-slate-900">User Management</h1>
                            <p class="text-slate-500">Manage all platform users, roles, and access.</p>
                        </div>
                    </div>
                    <button onclick="openAddUserModal()"
                        class="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl transition-colors flex items-center gap-2 shadow-lg shadow-brand-500/30">
                        <i data-lucide="plus" class="h-4 w-4"></i> Add User
                    </button>
                </div>

                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="px-6 py-4 font-semibold text-slate-900">User</th>
                                <th class="px-6 py-4 font-semibold text-slate-900">Role</th>
                                <th class="px-6 py-4 font-semibold text-slate-900">Status</th>
                                <th class="px-6 py-4 font-semibold text-slate-900 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100" id="users-table-body">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- User Profile Modal -->
    <div id="user-profile-modal"
        class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-50 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 transform scale-95 transition-transform duration-300"
            id="user-profile-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-900">User Profile</h3>
                <button onclick="closeUserProfile()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x" class="h-6 w-6"></i>
                </button>
            </div>
            <div id="user-profile-body">
                <!-- Injected -->
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div id="add-user-modal"
        class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-50 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 transform scale-95 transition-transform duration-300"
            id="add-user-content">
            <h3 class="text-xl font-bold text-slate-900 mb-4">Add New User</h3>
            <form id="add-user-form" onsubmit="createUser(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Full Name</label>
                        <input type="text" name="name" required
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-brand-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Email Address</label>
                        <input type="email" name="email" required
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-brand-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Role</label>
                        <select name="role"
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-brand-500">
                            <option value="student">Student</option>
                            <option value="admin">Admin</option>
                            <option value="analyst">Fraud Analyst</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="closeAddUserModal()"
                        class="flex-1 py-2.5 border border-slate-200 text-slate-600 font-bold rounded-xl hover:bg-slate-50 transition-colors">Cancel</button>
                    <button type="submit"
                        class="flex-1 py-2.5 bg-brand-600 text-white font-bold rounded-xl hover:bg-brand-700 transition-colors shadow-lg shadow-brand-500/30">CreateUser</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="utils.js"></script>
    <script src="admin-users.js"></script>
    <script src="layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = layout.init();
            if (user.role !== 'admin') {
                window.location.href = 'dashboard.html';
                return;
            }

            await renderUserTable();
        });

        async function renderUserTable() {
            try {
                const users = await utils.apiCall('api/admin_users.php');
                const userTable = document.getElementById('users-table-body');

                if (!users || users.length === 0) {
                    userTable.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-slate-500">No users found.</td></tr>`;
                    return;
                }

                userTable.innerHTML = users.map(u => `
                    <tr class="hover:bg-slate-50 transition-colors group">
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                 <img src="${u.avatar_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${u.full_name.replace(' ', '')}`}" class="h-10 w-10 rounded-full border border-slate-200">
                                 <div>
                                    <div class="font-bold text-slate-900">${u.full_name}</div>
                                    <div class="text-xs text-slate-500">${u.email}</div>
                                 </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 uppercase text-xs font-bold text-slate-500">${u.role}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded-full text-xs font-bold ${u.status === 'blocked' ? 'bg-red-100 text-red-800' : 'bg-emerald-100 text-emerald-800'}">
                                ${u.status || 'Active'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                             <div class="flex justify-end gap-2 opacity-100 group-hover:opacity-100 transition-opacity">
                                 <button onclick="viewUser('${u.id}')" class="p-2 text-slate-400 hover:text-brand-600 hover:bg-brand-50 rounded-lg transition-colors" title="View Profile">
                                    <i data-lucide="eye" class="h-4 w-4"></i>
                                 </button>
                                 ${u.role !== 'admin' ? `
                                    <button onclick="toggleUserBlock('${u.id}', '${u.status}')" class="p-2 ${u.status === 'blocked' ? 'text-brand-600 bg-brand-50' : 'text-slate-400 hover:text-orange-600 hover:bg-orange-50'} rounded-lg transition-colors" title="${u.status === 'blocked' ? 'Unblock' : 'Block'}">
                                        <i data-lucide="${u.status === 'blocked' ? 'unlock' : 'lock'}" class="h-4 w-4"></i>
                                    </button>
                                    <button onclick="deleteUser('${u.id}')" class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Delete User">
                                        <i data-lucide="trash-2" class="h-4 w-4"></i>
                                    </button>
                                 ` : ''}
                             </div>
                        </td>
                    </tr>
                `).join('');

                lucide.createIcons();
            } catch (error) {
                console.error('Failed to load users:', error);
                document.getElementById('users-table-body').innerHTML = `<tr><td colspan="4" class="text-center py-8 text-red-500">Error loading users.</td></tr>`;
            }
        }

        // --- ACTION HANDLERS ---
        function openAddUserModal() {
            const modal = document.getElementById('add-user-modal');
            const content = document.getElementById('add-user-content');
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            });
        }

        function closeAddUserModal() {
            const modal = document.getElementById('add-user-modal');
            const content = document.getElementById('add-user-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        async function createUser(e) {
            e.preventDefault();
            const form = e.target;

            const payload = {
                name: form.name.value,
                email: form.email.value,
                role: form.role.value,
                password: 'Password123!'
            };

            try {
                await utils.apiCall('api/admin_users.php', 'POST', payload);
                utils.showNotification('User created successfully');
                closeAddUserModal();
                renderUserTable();
                form.reset();
            } catch (error) {
                console.error('Create failed:', error);
                utils.showNotification(error.message || 'Create failed', 'error');
            }
        }

        window.viewUser = async (id) => {
            try {
                const data = await utils.apiCall(`api/get_profile.php?user_id=${id}`);
                if (data && data.user) {
                    const u = data.user;
                    const p = data.profile || {};

                    const modal = document.getElementById('user-profile-modal');
                    const content = document.getElementById('user-profile-content');
                    const body = document.getElementById('user-profile-body');

                    body.innerHTML = `
                        <div class="flex flex-col items-center mb-6">
                            <img src="${u.avatar_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${u.full_name.replace(' ', '')}`}" class="h-24 w-24 rounded-full border-4 border-slate-50 shadow-sm mb-3">
                            <h4 class="text-2xl font-bold text-slate-900">${u.full_name}</h4>
                            <p class="text-slate-500">${u.email}</p>
                            <div class="flex gap-2 mt-2">
                                 <span class="px-2 py-1 bg-slate-100 text-slate-600 text-xs font-bold uppercase rounded-md">${u.role}</span>
                                 <span class="px-2 py-1 ${u.status === 'blocked' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'} text-xs font-bold uppercase rounded-md">${u.status || 'Active'}</span>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 text-center">
                                <div class="text-xs text-slate-500 font-bold uppercase mb-1">Status</div>
                                <div class="text-xl font-bold text-slate-900 capitalize">${u.status}</div>
                            </div>
                             <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 text-center">
                                <div class="text-xs text-slate-500 font-bold uppercase mb-1">User ID</div>
                                <div class="text-xs font-mono text-slate-600 bg-white px-2 py-1 rounded border border-slate-200 inline-block overflow-hidden text-ellipsis max-w-full" title="${u.id}">${u.id}</div>
                            </div>
                        </div>

                        ${u.role === 'student' ? `
                            <div class="mb-4">
                                <h5 class="text-sm font-bold text-slate-900 mb-2">Academic Info</h5>
                                <div class="bg-white border border-slate-200 rounded-xl p-4 space-y-2 text-sm">
                                    <div class="flex justify-between">
                                        <span class="text-slate-500">University</span>
                                        <span class="font-medium">${p.university || 'N/A'}</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-slate-500">Major</span>
                                        <span class="font-medium">${p.major || 'N/A'}</span>
                                    </div>
                                </div>
                            </div>
                        ` : ''}

                        <div class="flex gap-3">
                             <button onclick="closeUserProfile()" class="flex-1 py-2.5 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-colors">Close</button>
                        </div>
                     `;

                    modal.classList.remove('hidden');
                    requestAnimationFrame(() => {
                        modal.classList.remove('opacity-0');
                        content.classList.remove('scale-95');
                    });
                }
            } catch (e) {
                console.error(e);
                utils.showNotification('Failed to load user details', 'error');
            }
        };

        window.closeUserProfile = () => {
            const modal = document.getElementById('user-profile-modal');
            const content = document.getElementById('user-profile-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        window.toggleUserBlock = async (id, currentStatus) => {
            const newStatus = currentStatus === 'blocked' ? 'active' : 'blocked';
            try {
                await utils.apiCall('api/admin_users.php', 'PUT', { id: id, status: newStatus });
                utils.showNotification(`User ${newStatus}`);
                renderUserTable();
            } catch (error) {
                console.error('Toggle Block Failed:', error);
                utils.showNotification(error.message, 'error');
            }
        };

        window.deleteUser = async (id) => {
            if (confirm('Are you sure you want to permanently delete this user? This action cannot be undone.')) {
                try {
                    await utils.apiCall(`api/admin_users.php?id=${id}`, 'DELETE');
                    utils.showNotification('User deleted permanently');
                    renderUserTable();
                } catch (error) {
                    console.error('Delete Failed:', error);
                    utils.showNotification(error.message, 'error');
                }
            }
        };
    </script>
</body>

</html>
