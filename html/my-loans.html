<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Loans - Loan & CrowdFunding</title>

    <!-- Fonts & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e' },
                        accent: { 500: '#6366f1' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard-styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-50 h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <!-- Sidebar Container -->
    <aside
        class="w-64 fixed inset-y-0 left-0 z-50 transition-transform duration-300 transform -translate-x-full md:translate-x-0"
        id="sidebar-container">
        <!-- Injected by layout.js -->
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-0 md:ml-64 flex flex-col h-full overflow-hidden relative">
        <!-- Mobile Header -->
        <header class="md:hidden bg-white border-b border-slate-200 p-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="graduation-cap" class="text-brand-600 h-6 w-6"></i>
                <span class="font-bold text-slate-900">UniFund</span>
            </div>
            <button class="text-slate-500"><i data-lucide="menu" class="h-6 w-6"></i></button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-7xl mx-auto fade-in">
                <div class="flex justify-between items-center mb-8">
                    <div class="flex items-center gap-4">
                        <button onclick="window.history.back()"
                            class="p-2 rounded-full hover:bg-slate-200 transition-colors" title="Go Back">
                            <i data-lucide="arrow-left" class="h-6 w-6 text-slate-600"></i>
                        </button>
                        <div>
                            <h1 class="text-2xl font-bold text-slate-900" id="page-title">My Loans</h1>
                            <p class="text-slate-500" id="page-subtitle">Manage your applications and repayments.</p>
                        </div>
                    </div>
                    <div id="header-actions">
                        <!-- Injected by JS -->
                    </div>
                </div>

                <div id="loans-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Loans injected by JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="utils.js"></script>
    <script src="layout.js"></script>
    <script src="my-loans.js?v=2"></script>
</body>

</html>
